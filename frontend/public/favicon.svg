<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Colors -->
  <!-- outline: #6B3E00 / gold: #F7C948 / shade: #D59A00 / highlight: #FFEFBF -->

  <!-- OUTLINE -->
  <g fill="#6B3E00">
    <!-- top -->
    <rect x="6" y="0" width="4" height="1"/>
    <rect x="4" y="1" width="8" height="1"/>
    <rect x="3" y="2" width="10" height="1"/>
    <rect x="2" y="3" width="12" height="1"/>
    <!-- sides -->
    <rect x="2" y="4" width="1" height="8"/>
    <rect x="13" y="4" width="1" height="8"/>
    <!-- bottom -->
    <rect x="2" y="12" width="12" height="1"/>
    <rect x="3" y="13" width="10" height="1"/>
    <rect x="4" y="14" width="8" height="1"/>
    <rect x="6" y="15" width="4" height="1"/>
  </g>

  <!-- GOLD FILL -->
  <g fill="#F7C948">
    <rect x="6" y="1" width="4" height="1"/>
    <rect x="4" y="2" width="8" height="1"/>
    <rect x="3" y="3" width="10" height="1"/>
    <rect x="3" y="4" width="10" height="8"/>
    <rect x="3" y="12" width="10" height="1"/>
    <rect x="4" y="13" width="8" height="1"/>
    <rect x="6" y="14" width="4" height="1"/>
  </g>

  <!-- RIGHT SHADE (gives thickness like Mario coin) -->
  <g fill="#D59A00">
    <rect x="11" y="3" width="2" height="1"/>
    <rect x="12" y="4" width="1" height="8"/>
    <rect x="11" y="12" width="2" height="1"/>
    <rect x="10" y="4" width="1" height="8"/>
    <rect x="11" y="4" width="1" height="8"/>
  </g>

  <!-- LEFT HIGHLIGHT -->
  <g fill="#FFEFBF">
    <rect x="4" y="4" width="1" height="3"/>
    <rect x="5" y="3" width="1" height="2"/>
    <rect x="5" y="5" width="1" height="2"/>
    <rect x="4" y="7" width="1" height="1"/>
  </g>

  <!-- INNER RIM (subtle ring) -->
  <g fill="#FFC857" opacity="0.9">
    <rect x="5" y="4" width="6" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
    <rect x="4" y="5" width="1" height="6"/>
    <rect x="11" y="5" width="1" height="6"/>
  </g>

  <!-- CENTER "C" -->
  <g fill="#4A2B00">
    <rect x="6" y="5" width="4" height="1"/>
    <rect x="6" y="6" width="1" height="3"/>
    <rect x="6" y="9" width="4" height="1"/>
    <!-- add thickness -->
    <rect x="7" y="6" width="1" height="1"/>
    <rect x="7" y="8" width="1" height="1"/>
  </g>
</svg>
